<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ESO Traits">
<meta name="theme-color" content="#1a1208">
<meta name="application-name" content="ESO Trait Tracker">
<meta name="msapplication-TileColor" content="#1a1208">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="icons/icon-180x180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

<!-- Standard Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

<!-- iOS Splash Screen / Status Bar -->
<meta name="apple-touch-fullscreen" content="yes">

<title>ESO Trait Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #7a6030;
  --parchment: #f5edd8;
  --parchment-dark: #e8dcc0;
  --ink: #1a1208;
  --ink-mid: #2e2010;
  --ink-soft: #4a3820;
  --known-bg: #1e3a1e;
  --known-border: #4a8a3a;
  --known-text: #a8d890;
  --bank-dot: #e8a020;
  --danger: #8a2020;
  --danger-light: #c04040;
  --scroll-bg: #2a1e0e;
  --card-bg: rgba(245,237,216,0.06);
  --card-border: rgba(201,168,76,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Crimson Text', Georgia, serif;
  background: var(--ink);
  color: var(--parchment);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 50%);
}

/* ── Safe area for notched iPhones ── */
body {
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* ── Header ── */
header {
  background: linear-gradient(180deg, #0e0a04 0%, var(--ink-mid) 100%);
  border-bottom: 1px solid var(--gold-dim);
  padding: 14px 16px 12px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-ornament {
  color: var(--gold-dim);
  font-size: 18px;
  line-height: 1;
}

/* ── Tabs ── */
.char-tabs-wrap {
  background: var(--ink-mid);
  border-bottom: 1px solid var(--gold-dim);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  gap: 0;
}
.char-tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.05em;
  color: var(--gold-dim);
  padding: 10px 16px;
  white-space: nowrap;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.tab:hover { color: var(--gold); }
.tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
.tab-add {
  font-size: 18px;
  color: var(--gold-dim);
  padding: 6px 14px;
  cursor: pointer;
  display: flex; align-items: center;
  flex-shrink: 0;
  transition: color 0.15s;
}
.tab-add:hover { color: var(--gold); }

/* ── Add char modal ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,7,2,0.85);
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--ink-mid);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 24px 20px;
  width: min(340px, calc(100vw - 32px));
}
.modal h2 {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.modal p {
  font-size: 14px;
  color: rgba(245,237,216,0.7);
  margin-bottom: 16px;
  line-height: 1.4;
}
.modal input {
  width: 100%;
  background: rgba(245,237,216,0.07);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 10px 12px;
  font-family: 'Crimson Text', serif;
  font-size: 17px;
  color: var(--parchment);
  margin-bottom: 14px;
  outline: none;
}
.modal input:focus { border-color: var(--gold); }
.modal input::placeholder { color: rgba(245,237,216,0.3); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.06em;
  padding: 8px 18px;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold-dim);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-gold {
  background: var(--gold-dim);
  color: var(--parchment);
  border-color: var(--gold);
}
.btn-gold:hover { background: var(--gold); color: var(--ink); }
.btn-danger {
  border-color: var(--danger);
  color: var(--danger-light);
}
.btn-danger:hover { background: rgba(138,32,32,0.2); border-color: var(--danger-light); color: var(--danger-light); }

/* ── Stats bar ── */
.stats-bar {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--gold-dim);
  background: var(--scroll-bg);
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat {
  flex: 1; min-width: 80px;
  padding: 10px 12px;
  text-align: center;
  border-right: 1px solid rgba(201,168,76,0.15);
}
.stat:last-child { border-right: none; }
.stat-val {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold-light);
  line-height: 1;
}
.stat-lbl { font-size: 11px; color: rgba(245,237,216,0.45); margin-top: 3px; letter-spacing: 0.03em; }

/* ── Legend ── */
.legend {
  display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
  background: rgba(10,7,2,0.4);
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: rgba(245,237,216,0.55); }
.l-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.l-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-hint { font-size: 12px; color: rgba(245,237,216,0.35); margin-left: auto; font-style: italic; }

/* ── Sections (Collapsible Crafting Skill Groups) ── */
main { padding: 0 0 80px; }

.section-header {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.10em;
  color: var(--gold);
  padding: 14px 14px 10px;
  border-bottom: 1px solid rgba(201,168,76,0.18);
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
  background: rgba(201,168,76,0.04);
  transition: background 0.15s;
}
.section-header:hover { background: rgba(201,168,76,0.08); }
.section-header:active { background: rgba(201,168,76,0.12); }
.section-chevron {
  font-size: 10px;
  transition: transform 0.2s;
  color: var(--gold-dim);
}
.section-header.collapsed .section-chevron { transform: rotate(-90deg); }
.section-title { flex: 1; }
.section-progress {
  font-family: 'Crimson Text', serif;
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 0;
}
.section-header::after {
  content: '';
  flex: 0;
  height: 0;
}
.section-body {
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.section-body.collapsed {
  max-height: 0 !important;
}

/* ── Sub-section (armor weight classes within a crafting skill) ── */
.sub-section-header {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--gold-dim);
  padding: 10px 14px 6px;
  display: flex; align-items: center; gap: 8px;
}
.sub-section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(201,168,76,0.12);
  margin-left: 6px;
}

/* ── Gear card ── */
.gear-card {
  margin: 10px 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  overflow: hidden;
}
.gear-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px 7px;
  background: rgba(201,168,76,0.07);
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.gear-name {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.04em;
}
.gear-prog { font-size: 12px; color: rgba(245,237,216,0.4); }
.progress-bar-wrap { height: 3px; background: rgba(255,255,255,0.07); }
.progress-bar { height: 100%; background: var(--known-border); transition: width 0.25s; }

/* ── Traits grid ── */
.traits-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 8px;
}
.trait-cell {
  border-radius: 4px;
  border: 1px solid rgba(201,168,76,0.18);
  background: rgba(255,255,255,0.03);
  color: rgba(245,237,216,0.55);
  font-size: 12px;
  font-family: 'Crimson Text', serif;
  text-align: center;
  padding: 8px 4px 7px;
  cursor: pointer;
  position: relative;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.25;
  -webkit-user-select: none; user-select: none;
  touch-action: none;
}
.trait-cell:active { opacity: 0.75; }
.trait-cell.known {
  background: rgba(74,138,58,0.2);
  border-color: rgba(74,138,58,0.55);
  color: var(--known-text);
}
.bank-pip {
  position: absolute;
  top: 3px; right: 3px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--bank-dot);
  box-shadow: 0 0 4px rgba(232,160,32,0.6);
  display: none;
}
.trait-cell.has-bank .bank-pip { display: block; }

/* ── Empty / no-chars ── */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px;
  gap: 12px;
  color: rgba(245,237,216,0.35);
  text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.4; }
.empty p { font-size: 16px; font-style: italic; }

/* ── Char actions ── */
.char-actions { display: flex; justify-content: flex-end; padding: 10px 12px 0; }
.btn-delete {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--danger-light);
  border: 1px solid rgba(138,32,32,0.4);
  background: transparent;
  border-radius: 4px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-delete:hover { background: rgba(138,32,32,0.2); border-color: var(--danger-light); }

/* ── Footer ── */
.app-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: linear-gradient(0deg, #0e0a04 0%, var(--ink-mid) 100%);
  border-top: 1px solid var(--gold-dim);
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  display: flex; justify-content: center; gap: 12px;
}
.btn-footer {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.06em;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold-dim);
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-footer:hover { border-color: var(--gold); color: var(--gold); }
.btn-footer .btn-icon { font-size: 14px; }
.import-msg {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  z-index: 150;
  font-family: 'Crimson Text', serif; font-size: 15px;
  padding: 10px 20px; border-radius: 6px;
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap;
}
.import-msg.show { opacity: 1; }
.import-msg.success { background: var(--known-bg); border: 1px solid var(--known-border); color: var(--known-text); }
.import-msg.error { background: rgba(138,32,32,0.85); border: 1px solid var(--danger-light); color: #f5c0c0; }

/* ── Long-press context menu ── */
.ctx-menu {
  display: none;
  position: fixed;
  z-index: 300;
  background: var(--ink-mid);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  min-width: 180px;
}
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 12px 16px;
  font-size: 15px;
  color: var(--parchment);
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
}
.ctx-item:last-child { border-bottom: none; }
.ctx-item:active { background: rgba(201,168,76,0.1); }
.ctx-icon { font-size: 16px; width: 20px; text-align: center; }
</style>
</head>
<body>

<header>
  <span class="header-ornament">⚔</span>
  <h1>ESO Trait Tracker</h1>
</header>

<div id="charTabsWrap" class="char-tabs-wrap">
  <div class="tab-add" onclick="openAddModal()" title="Add character">＋</div>
</div>

<div id="mainContent"></div>

<!-- Add character modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <h2>New Character</h2>
    <input type="text" id="charNameInp" placeholder="Enter character name..." maxlength="40"
      onkeydown="if(event.key==='Enter')confirmAddChar()" />
    <div class="modal-btns">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmAddChar()">Add</button>
    </div>
  </div>
</div>

<!-- Migration modal -->
<div class="modal-backdrop" id="migrateModal">
  <div class="modal">
    <h2>Data Update Required</h2>
    <p>The trait tracker has been restructured with crafting skill groups and split armor weight classes. Your existing data can be migrated automatically.</p>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="migrateDecision('fresh')">Start Fresh</button>
      <button class="btn btn-gold" onclick="migrateDecision('migrate')">Migrate Data</button>
    </div>
  </div>
</div>

<!-- Context menu for mobile long-press -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxToggleKnown" onclick="ctxAction('known')">
    <span class="ctx-icon">✓</span><span id="ctxKnownLabel">Mark as known</span>
  </div>
  <div class="ctx-item" id="ctxToggleBank" onclick="ctxAction('bank')">
    <span class="ctx-icon">●</span><span id="ctxBankLabel">Mark in bank</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  DATA MODEL — V5 (Crafting Skill Groups)
// ══════════════════════════════════════════════════════════════
const STORAGE_KEY = "esoTraitV5";

// Armor pieces (same 7 slots for each weight class)
const ARMOR_PIECES = ["Head","Chest","Shoulders","Hands","Waist","Legs","Feet"];

// Crafting skill definitions — order determines display order
const CRAFTING_SKILLS = [
  {
    id: "woodworking",
    name: "Woodworking",
    icon: "🪓",
    groups: [
      { label: null, slots: ["Bow","Shield","Fire Staff","Ice Staff","Lightning Staff","Restoration Staff"] }
    ]
  },
  {
    id: "blacksmithing",
    name: "Blacksmithing",
    icon: "⚒",
    groups: [
      { label: "Weapons", slots: ["Sword","Axe","Mace","Dagger","Greatsword","Battle Axe","Maul"] },
      { label: "Heavy Armor", slots: ARMOR_PIECES.map(p => "Heavy " + p) }
    ]
  },
  {
    id: "clothing",
    name: "Clothing",
    icon: "🧵",
    groups: [
      { label: "Light Armor", slots: ARMOR_PIECES.map(p => "Light " + p) },
      { label: "Medium Armor", slots: ARMOR_PIECES.map(p => "Medium " + p) }
    ]
  },
  {
    id: "jewelry",
    name: "Jewelry Crafting",
    icon: "💍",
    groups: [
      { label: null, slots: ["Ring","Necklace"] }
    ]
  }
];

// Flatten all slots for iteration
const ALL_SLOTS = CRAFTING_SKILLS.flatMap(cs => cs.groups.flatMap(g => g.slots));

// Trait lists per type
const ARMOR_TRAITS   = ["Divines","Infused","Reinforced","Well-Fitted","Training","Sturdy","Impenetrable","Invigorating","Nirnhoned"];
const WEAPON_TRAITS  = ["Powered","Charged","Precise","Infused","Defending","Training","Sharpened","Decisive","Nirnhoned"];
const JEWELRY_TRAITS = ["Arcane","Healthy","Robust","Harmony","Infused","Protective","Swift","Triune","Bloodthirsty"];

// Armor slot names (any slot containing a weight prefix + armor piece, plus Shield)
const ARMOR_SLOT_SET = new Set([
  ...ARMOR_PIECES.flatMap(p => ["Light " + p, "Medium " + p, "Heavy " + p]),
  "Shield"
]);
const JEWELRY_SLOT_SET = new Set(["Ring","Necklace"]);

function getTraits(slot) {
  if (ARMOR_SLOT_SET.has(slot))   return ARMOR_TRAITS;
  if (JEWELRY_SLOT_SET.has(slot)) return JEWELRY_TRAITS;
  return WEAPON_TRAITS;
}

// Short display name: strip weight prefix for armor pieces to save space in cards
function displaySlotName(slot) {
  for (const prefix of ["Light ","Medium ","Heavy "]) {
    if (slot.startsWith(prefix)) return slot.substring(prefix.length);
  }
  return slot;
}

// ══════════════════════════════════════════════════════════════
//  DATA LOADING & MIGRATION
// ══════════════════════════════════════════════════════════════
let data = null;
let pendingMigration = false;

function repairV5(d) {
  // Fix trait renames (Prosperous → Invigorating) and Shield trait type
  let changed = false;
  for (const ch of d.chars) {
    for (const slot of ALL_SLOTS) {
      if (!ch.research[slot]) { ch.research[slot] = {}; changed = true; }
      const expected = getTraits(slot);
      // Rename Prosperous → Invigorating for armor slots
      if (ARMOR_SLOT_SET.has(slot) && ch.research[slot]["Prosperous"] && !ch.research[slot]["Invigorating"]) {
        ch.research[slot]["Invigorating"] = ch.research[slot]["Prosperous"];
        delete ch.research[slot]["Prosperous"];
        changed = true;
      }
      // If Shield had weapon traits, rebuild with armor traits preserving any matching names
      if (slot === "Shield") {
        const oldData = ch.research[slot];
        const rebuilt = {};
        for (const t of expected) {
          rebuilt[t] = oldData[t] || { known: false, inBank: false };
        }
        ch.research[slot] = rebuilt;
        changed = true;
      }
      // Ensure all expected traits exist
      for (const t of expected) {
        if (!ch.research[slot][t]) { ch.research[slot][t] = { known: false, inBank: false }; changed = true; }
      }
    }
  }
  return changed;
}

function loadData() {
  // Try V5 first
  try {
    const v5 = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (v5 && v5.version === 5) {
      data = v5;
      if (repairV5(data)) save();
      return;
    }
  } catch(e){}

  // Try V4 migration
  try {
    const v4 = JSON.parse(localStorage.getItem("esoTraitV4") || "null");
    if (v4 && Array.isArray(v4.chars) && v4.chars.length > 0) {
      pendingMigration = true;
      data = v4; // temporarily hold V4 data
      return;
    }
  } catch(e){}

  // Fresh start
  data = { version: 5, chars: [], active: null };
}

function migrateV4toV5(v4data) {
  // Old V4 slots
  const OLD_ARMOR  = ["Head","Shoulders","Chest","Hands","Waist","Legs","Feet"];
  const OLD_WEAPONS = ["Sword","Shield","Dagger","Axe","Mace","Greatsword","Battle Axe","Maul","Staff","Bow"];
  const OLD_JEWELRY = ["Neck","Ring 1","Ring 2"];

  const newData = { version: 5, chars: [], active: v4data.active };

  for (const oldChar of v4data.chars) {
    const research = {};

    // Initialize all V5 slots with blank traits
    ALL_SLOTS.forEach(slot => {
      research[slot] = {};
      getTraits(slot).forEach(t => { research[slot][t] = { known: false, inBank: false }; });
    });

    // Migrate armor → copy to all three weight classes
    for (const piece of OLD_ARMOR) {
      if (oldChar.research && oldChar.research[piece]) {
        for (const weight of ["Light","Medium","Heavy"]) {
          const newSlot = weight + " " + piece;
          const oldTraitData = oldChar.research[piece];
          for (const trait of ARMOR_TRAITS) {
            if (oldTraitData[trait]) {
              research[newSlot][trait] = { ...oldTraitData[trait] };
            }
          }
        }
      }
    }

    // Migrate weapons
    for (const wep of OLD_WEAPONS) {
      if (wep === "Staff" && oldChar.research && oldChar.research["Staff"]) {
        // Staff → copy to all 4 staff types
        const oldStaff = oldChar.research["Staff"];
        for (const staffType of ["Fire Staff","Ice Staff","Lightning Staff","Restoration Staff"]) {
          for (const trait of WEAPON_TRAITS) {
            if (oldStaff[trait]) {
              research[staffType][trait] = { ...oldStaff[trait] };
            }
          }
        }
      } else if (oldChar.research && oldChar.research[wep] && research[wep]) {
        for (const trait of WEAPON_TRAITS) {
          if (oldChar.research[wep][trait]) {
            research[wep][trait] = { ...oldChar.research[wep][trait] };
          }
        }
      }
    }

    // Migrate jewelry: Neck → Necklace, Ring 1 + Ring 2 → Ring (merge, prefer known)
    if (oldChar.research) {
      if (oldChar.research["Neck"]) {
        for (const trait of JEWELRY_TRAITS) {
          if (oldChar.research["Neck"][trait]) {
            research["Necklace"][trait] = { ...oldChar.research["Neck"][trait] };
          }
        }
      }
      // Merge Ring 1 and Ring 2 into Ring (if either is known, mark known)
      const r1 = oldChar.research["Ring 1"];
      const r2 = oldChar.research["Ring 2"];
      if (r1 || r2) {
        for (const trait of JEWELRY_TRAITS) {
          const t1 = r1?.[trait] || { known: false, inBank: false };
          const t2 = r2?.[trait] || { known: false, inBank: false };
          research["Ring"][trait] = {
            known: t1.known || t2.known,
            inBank: (t1.known || t2.known) ? false : (t1.inBank || t2.inBank)
          };
        }
      }
    }

    newData.chars.push({ id: oldChar.id, name: oldChar.name, research });
  }

  return newData;
}

function migrateDecision(choice) {
  document.getElementById("migrateModal").classList.remove("open");
  if (choice === "migrate") {
    data = migrateV4toV5(data);
  } else {
    data = { version: 5, chars: [], active: null };
  }
  pendingMigration = false;
  save();
  render();
}

loadData();

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }

function newResearch() {
  const r = {};
  ALL_SLOTS.forEach(slot => {
    r[slot] = {};
    getTraits(slot).forEach(t => { r[slot][t] = { known: false, inBank: false }; });
  });
  return r;
}

function getChar() { return data.chars.find(c => c.id === data.active) || null; }

// ── Modal ─────────────────────────────────────────────────
function openAddModal() {
  document.getElementById("addModal").classList.add("open");
  setTimeout(() => document.getElementById("charNameInp").focus(), 100);
}
function closeAddModal() {
  document.getElementById("addModal").classList.remove("open");
  document.getElementById("charNameInp").value = "";
}
function confirmAddChar() {
  const name = document.getElementById("charNameInp").value.trim();
  if (!name) return;
  const id = "c" + Date.now();
  data.chars.push({ id, name, research: newResearch() });
  data.active = id;
  closeAddModal();
  save(); render();
}

function deleteChar(id) {
  if (!confirm("Delete this character? This cannot be undone.")) return;
  data.chars = data.chars.filter(c => c.id !== id);
  data.active = data.chars[0]?.id || null;
  save(); render();
}

function setActive(id) { data.active = id; render(); }

// ── Context menu (long-press for mobile, right-click desktop) ──
let ctxTarget = null;
let pressTimer = null;
let ctxOpen = false;

function openCtxMenu(e, charId, slot, trait) {
  const char = data.chars.find(c => c.id === charId);
  if (!char) return;
  const s = char.research[slot][trait];
  ctxTarget = { charId, slot, trait };

  document.getElementById("ctxKnownLabel").textContent = s.known ? "Unmark as known" : "Mark as known";
  document.getElementById("ctxBankLabel").textContent = s.inBank ? "Remove from bank" : "Mark in bank";

  const menu = document.getElementById("ctxMenu");
  const x = Math.min(e.clientX || (e.touches?.[0]?.clientX) || 100, window.innerWidth - 200);
  const y = Math.min(e.clientY || (e.touches?.[0]?.clientY) || 100, window.innerHeight - 120);
  menu.style.left = x + "px";
  menu.style.top  = y + "px";
  menu.classList.add("open");
  ctxOpen = true;
}

function closeCtxMenu() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxOpen = false;
  ctxTarget = null;
}

function ctxAction(type) {
  if (!ctxTarget) return;
  const { charId, slot, trait } = ctxTarget;
  const char = data.chars.find(c => c.id === charId);
  if (!char) return;
  const s = char.research[slot][trait];
  if (type === "known") {
    s.known = !s.known;
    if (s.known) s.inBank = false;
  } else {
    if (!s.known) s.inBank = !s.inBank;
  }
  closeCtxMenu();
  save(); render();
}

document.addEventListener("click", e => {
  if (ctxOpen && !document.getElementById("ctxMenu").contains(e.target)) closeCtxMenu();
});

// ── Trait cell touch/click handling ──────────────────────
function attachTraitEvents(el, charId, slot, trait) {
  el.addEventListener("click", e => {
    e.stopPropagation();
    if (ctxOpen) { closeCtxMenu(); return; }
    const char = data.chars.find(c => c.id === charId);
    const s = char.research[slot][trait];
    s.known = !s.known;
    if (s.known) s.inBank = false;
    save(); renderChar();
  });

  el.addEventListener("contextmenu", e => {
    e.preventDefault();
    openCtxMenu(e, charId, slot, trait);
  });

  el.addEventListener("touchstart", e => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      openCtxMenu(e, charId, slot, trait);
    }, 500);
  }, { passive: true });

  el.addEventListener("touchend", e => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
      const char = data.chars.find(c => c.id === charId);
      const s = char.research[slot][trait];
      s.known = !s.known;
      if (s.known) s.inBank = false;
      save(); renderChar();
    }
  }, { passive: true });

  el.addEventListener("touchmove", () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  }, { passive: true });
}

// ── Section collapse state (persisted per character) ──
let collapsedSections = {};
try { collapsedSections = JSON.parse(localStorage.getItem("esoTraitCollapsed") || "{}"); } catch(e) { collapsedSections = {}; }
function saveCollapsed() { try { localStorage.setItem("esoTraitCollapsed", JSON.stringify(collapsedSections)); } catch(e){} }

function toggleSection(sectionId) {
  collapsedSections[sectionId] = !collapsedSections[sectionId];
  saveCollapsed();
  renderChar();
}

// ── Rendering ─────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById("charTabsWrap");
  wrap.innerHTML = data.chars.map(c =>
    `<div class="tab${c.id === data.active ? ' active' : ''}" onclick="setActive('${c.id}')">${c.name}</div>`
  ).join("") + `<div class="tab-add" onclick="openAddModal()">＋</div>`;
}

function renderChar() {
  const char = getChar();
  const el = document.getElementById("mainContent");
  if (!char) return;

  // Stats
  let total=0, known=0, inBank=0;
  ALL_SLOTS.forEach(slot => getTraits(slot).forEach(t => {
    const s = char.research[slot][t];
    total++;
    if (s.known) known++;
    else if (s.inBank) inBank++;
  }));
  const pct = Math.round(known / total * 100);

  // Build a single gear card
  function buildCard(slot) {
    const traits = getTraits(slot);
    let slotKnown = 0;
    traits.forEach(t => { if (char.research[slot][t].known) slotKnown++; });
    const spct = Math.round(slotKnown / traits.length * 100);

    const cells = traits.map(t => {
      const s = char.research[slot][t];
      const cls = [
        "trait-cell",
        s.known ? "known" : "",
        (!s.known && s.inBank) ? "has-bank" : ""
      ].filter(Boolean).join(" ");
      return `<div class="${cls}" data-char="${char.id}" data-slot="${slot}" data-trait="${t}">
        <div class="bank-pip"></div>${t}
      </div>`;
    }).join("");

    return `<div class="gear-card">
      <div class="gear-card-head">
        <span class="gear-name">${displaySlotName(slot)}</span>
        <span class="gear-prog">${slotKnown}/${traits.length}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${spct}%"></div></div>
      <div class="traits-grid">${cells}</div>
    </div>`;
  }

  // Build crafting skill sections
  let sectionsHTML = "";
  for (const skill of CRAFTING_SKILLS) {
    // Calculate section-level progress
    let sKnown = 0, sTotal = 0;
    for (const group of skill.groups) {
      for (const slot of group.slots) {
        getTraits(slot).forEach(t => {
          sTotal++;
          if (char.research[slot][t].known) sKnown++;
        });
      }
    }
    const isCollapsed = !!collapsedSections[skill.id];

    let bodyHTML = "";
    for (const group of skill.groups) {
      if (group.label) {
        bodyHTML += `<div class="sub-section-header">${group.label}</div>`;
      }
      bodyHTML += group.slots.map(slot => buildCard(slot)).join("");
    }

    sectionsHTML += `
      <div class="section-header${isCollapsed ? ' collapsed' : ''}" onclick="toggleSection('${skill.id}')">
        <span class="section-chevron">▼</span>
        <span class="section-title">${skill.icon} ${skill.name}</span>
        <span class="section-progress">${sKnown}/${sTotal}</span>
      </div>
      <div class="section-body${isCollapsed ? ' collapsed' : ''}" id="section-${skill.id}"
           style="${isCollapsed ? 'max-height:0' : 'max-height:none'}">
        ${bodyHTML}
      </div>`;
  }

  el.innerHTML = `
    <div class="stats-bar">
      <div class="stat"><div class="stat-val">${known}</div><div class="stat-lbl">Known</div></div>
      <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Complete</div></div>
      <div class="stat"><div class="stat-val">${inBank}</div><div class="stat-lbl">In Bank</div></div>
      <div class="stat"><div class="stat-val">${total-known-inBank}</div><div class="stat-lbl">Remaining</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="l-swatch" style="background:rgba(74,138,58,0.25);border:1px solid rgba(74,138,58,0.55)"></div>Known</div>
      <div class="legend-item"><div class="l-dot" style="background:#e8a020"></div>In bank</div>
      <div class="legend-hint">Tap = known &nbsp;·&nbsp; Hold = options</div>
    </div>
    <main>
      ${sectionsHTML}
      <div class="char-actions">
        <button class="btn-delete" onclick="deleteChar('${char.id}')">Delete Character</button>
      </div>
    </main>
  `;

  // Attach events to all trait cells
  el.querySelectorAll(".trait-cell").forEach(cell => {
    attachTraitEvents(cell, cell.dataset.char, cell.dataset.slot, cell.dataset.trait);
  });
}

function renderEmpty() {
  document.getElementById("mainContent").innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚔</div>
      <p>No characters yet.<br>Tap <strong>＋</strong> to add one.</p>
    </div>`;
}

function render() {
  if (pendingMigration) {
    document.getElementById("migrateModal").classList.add("open");
    return;
  }
  renderTabs();
  if (data.chars.length && data.active) renderChar();
  else renderEmpty();
}

render();

// ── Import / Export ───────────────────────────────────────
function showToast(msg, type) {
  const el = document.getElementById("importMsg");
  el.textContent = msg;
  el.className = "import-msg " + type + " show";
  setTimeout(() => el.classList.remove("show"), 3000);
}

function exportData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { showToast("Nothing to export — no data found.", "error"); return; }
  try { JSON.parse(raw); } catch(e) { showToast("Stored data is corrupted.", "error"); return; }
  const now = new Date();
  const stamp = now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0");
  const blob = new Blob([raw], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "esott-data-" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
  showToast("Data exported successfully!", "success");
}

function importData() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = ".json,application/json";
  inp.onchange = () => {
    const file = inp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        // ── Validate structure ──
        if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.chars)) {
          showToast("Invalid file: missing 'chars' array.", "error"); return;
        }

        // Check if this is V4 format (no version field or version < 5)
        if (!parsed.version || parsed.version < 5) {
          // Attempt V4 migration on imported data
          try {
            const migrated = migrateV4toV5(parsed);
            data = migrated;
            if (!data.active && data.chars.length) data.active = data.chars[0].id;
            save();
            render();
            showToast("V4 data imported & migrated! (" + data.chars.length + " char" + (data.chars.length !== 1 ? "s" : "") + ")", "success");
            return;
          } catch(e) {
            showToast("Could not migrate old format data.", "error"); return;
          }
        }

        // Validate V5 structure
        for (const c of parsed.chars) {
          if (!c.id || !c.name || !c.research || typeof c.research !== "object") {
            showToast("Invalid file: bad character entry '" + (c.name || "unknown") + "'.", "error"); return;
          }
          for (const slot of ALL_SLOTS) {
            if (!c.research[slot] || typeof c.research[slot] !== "object") {
              showToast("Invalid file: missing slot '" + slot + "' for " + c.name + ".", "error"); return;
            }
            const expectedTraits = getTraits(slot);
            for (const t of expectedTraits) {
              if (!c.research[slot][t] || typeof c.research[slot][t] !== "object") {
                showToast("Invalid file: missing trait '" + t + "' in " + slot + " for " + c.name + ".", "error"); return;
              }
              if (typeof c.research[slot][t].known !== "boolean" || typeof c.research[slot][t].inBank !== "boolean") {
                showToast("Invalid file: bad trait data for " + t + "/" + slot + ".", "error"); return;
              }
            }
          }
        }
        // Validated — load it
        data = parsed;
        data.version = 5;
        if (!data.active && data.chars.length) data.active = data.chars[0].id;
        save();
        render();
        showToast("Data imported successfully! (" + data.chars.length + " character" + (data.chars.length !== 1 ? "s" : "") + ")", "success");
      } catch(e) {
        showToast("Invalid JSON file — could not parse.", "error");
      }
    };
    reader.onerror = () => showToast("Error reading file.", "error");
    reader.readAsText(file);
  };
  inp.click();
}
</script>

<!-- Footer with Import/Export buttons -->
<footer class="app-footer">
  <button class="btn-footer" onclick="importData()"><span class="btn-icon">📥</span> Import</button>
  <button class="btn-footer" onclick="exportData()"><span class="btn-icon">📤</span> Export</button>
</footer>
<input type="file" id="importFile" accept=".json" style="display:none">
<div id="importMsg" class="import-msg"></div>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[PWA] Service worker registered, scope:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated') {
              console.log('[PWA] New service worker activated — refresh for updates');
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });
}
</script>
